<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="小熊记账">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no,email=no">
<meta name="theme-color" content="#1a73e8">
<meta name="application-name" content="小熊记账">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="manifest" href="./manifest.json?v=1.2.3">
<link rel="apple-touch-icon" sizes="192x192" href="./icons/icon-192.png?v=1.2.3">
<link rel="apple-touch-icon" sizes="512x512" href="./icons/icon-512.png?v=1.2.3">
<link rel="apple-touch-icon" sizes="1024x1024" href="./icons/icon-1024.png?v=1.2.3">
<link rel="apple-touch-startup-image" href="./icons/icon-1024.png?v=1.2.3" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)">
<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png?v=1.2.3">
<link rel="stylesheet" href="./css/app.css?v=1.2.3">
<title>小熊记账</title>
</head>
<body>
<div id="app" style="opacity:0;transition:opacity 0.3s">

  <!-- Header -->
  <header class="app-header">
    <h1>小熊记账</h1>
    <div class="header-actions">
      <button class="header-btn" id="btn-export" title="导出数据">⬇️</button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="app-main" role="main">

    <!-- === Dashboard === -->
    <section id="view-dashboard" class="view active">
      <div class="month-selector">
        <button class="month-nav prev" aria-label="上个月">‹</button>
        <span class="month-label"></span>
        <button class="month-nav next" aria-label="下个月">›</button>
      </div>

      <div class="balance-card">
        <div class="balance-label">本月结余</div>
        <div class="balance-amount" id="balance-amount">¥ 0.00</div>
        <div class="balance-row">
          <div class="balance-item">
            <div class="label">收入</div>
            <div class="amount income" id="income-amount">¥ 0.00</div>
          </div>
          <div class="balance-item">
            <div class="label">支出</div>
            <div class="amount expense" id="expense-amount">¥ 0.00</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">支出分类</div>
        <div id="expense-breakdown" class="category-breakdown">
          <div class="empty-state">
            <div class="empty-icon">📊</div>
            <div class="empty-text">加载中...</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">最近记录</div>
        <div id="recent-transactions" class="recent-list">
          <div class="empty-state">
            <div class="empty-icon">📝</div>
            <div class="empty-text">加载中...</div>
          </div>
        </div>
      </div>
    </section>

    <!-- === Transactions === -->
    <section id="view-transactions" class="view">
      <div class="month-selector">
        <button class="month-nav prev" aria-label="上个月">‹</button>
        <span class="month-label"></span>
        <button class="month-nav next" aria-label="下个月">›</button>
      </div>

      <div class="filter-bar">
        <button class="filter-chip active" data-filter="all">全部</button>
        <button class="filter-chip" data-filter="expense">支出</button>
        <button class="filter-chip" data-filter="income">收入</button>
      </div>

      <div id="tx-list" class="tx-list">
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <div class="empty-text">加载中...</div>
        </div>
      </div>
    </section>

    <!-- === Analytics === -->
    <section id="view-analytics" class="view">
      <div class="card">
        <div class="card-title" id="stat-month-label"></div>
        <div class="stat-grid">
          <div class="stat-card">
            <div class="stat-label">总收入</div>
            <div class="stat-value green" id="stat-income">¥ 0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">总支出</div>
            <div class="stat-value red" id="stat-expense">¥ 0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">交易笔数</div>
            <div class="stat-value blue" id="stat-count">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">结余</div>
            <div class="stat-value green" id="stat-balance">¥ 0</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">收支趋势（近6月）</div>
        <div id="trend-chart"></div>
      </div>

      <div class="card">
        <div class="card-title">分类排行</div>
        <div id="category-rank" class="category-breakdown">
          <div class="empty-state">
            <div class="empty-icon">📊</div>
            <div class="empty-text">加载中...</div>
          </div>
        </div>
      </div>
    </section>

    <!-- === Settings === -->
    <section id="view-settings" class="view">
      <div class="card">
        <div class="card-title">数据管理</div>
        <div class="settings-list">
          <div class="settings-item" id="setting-import">
            <div class="si-left">
              <span class="si-icon">📥</span>
              <span class="si-label">导入数据</span>
            </div>
            <span class="si-value">恢复备份</span>
          </div>
          <div class="settings-item" id="setting-export">
            <div class="si-left">
              <span class="si-icon">📤</span>
              <span class="si-label">导出数据</span>
            </div>
            <span class="si-value">备份到文件</span>
          </div>
          <div class="settings-item" id="setting-reset">
            <div class="si-left">
              <span class="si-icon">🗑️</span>
              <span class="si-label">清除所有数据</span>
            </div>
            <span class="si-value">不可撤销</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">关于</div>
        <div class="settings-list">
          <div class="settings-item">
            <div class="si-left">
              <span class="si-icon">🐻</span>
              <span class="si-label">小熊记账</span>
            </div>
            <span class="si-value" id="app-version">v1.2.3</span>
          </div>
          <div class="settings-item">
            <div class="si-left">
              <span class="si-icon">📖</span>
              <span class="si-label">数据完全离线存储</span>
            </div>
            <span class="si-value">🔒</span>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- Bottom Tab Bar -->
  <nav class="tab-bar">
    <button class="tab-item active" data-view="dashboard">
      <span class="tab-icon">🏠</span>
      <span class="tab-label">首页</span>
    </button>
    <button class="tab-item" data-view="transactions">
      <span class="tab-icon">📋</span>
      <span class="tab-label">账单</span>
    </button>
    <button class="tab-item" data-view="analytics">
      <span class="tab-icon">📊</span>
      <span class="tab-label">统计</span>
    </button>
    <button class="tab-item" data-view="settings">
      <span class="tab-icon">⚙️</span>
      <span class="tab-label">设置</span>
    </button>
  </nav>

  <!-- FAB -->
  <button class="fab" id="fab-add" aria-label="添加记录">+</button>

</div>
<noscript>您的浏览器需要启用 JavaScript 才能使用本应用。</noscript>

<!-- Modal Overlay -->
<div class="modal-overlay" id="modal-overlay"></div>

<!-- Add/Edit Transaction Modal -->
<div class="modal-sheet" id="modal-add">
  <div class="modal-handle"></div>
  <div class="modal-header">
    <h2 id="modal-title">记一笔</h2>
    <button class="modal-close">✕</button>
  </div>
  <div class="modal-body">
    <div class="form-group">
      <label>类型</label>
      <div class="type-toggle" id="add-type-toggle">
        <button class="type-toggle-btn expense active" data-type="expense">支出</button>
        <button class="type-toggle-btn income" data-type="income">收入</button>
      </div>
    </div>
    <div class="form-group">
      <label>金额</label>
      <input type="text" class="form-input amount-input" id="add-amount" placeholder="0.00" inputmode="decimal" autocomplete="off">
    </div>
    <div class="form-group">
      <label>分类</label>
      <div id="category-picker" class="category-grid"></div>
    </div>
    <div class="form-group">
      <label>日期</label>
      <input type="date" class="form-input" id="add-date">
    </div>
    <div class="form-group">
      <label>备注（选填）</label>
      <input type="text" class="form-input" id="add-note" placeholder="备注信息" maxlength="50">
    </div>
    <button class="btn-primary" id="submit-btn">保存</button>
    <div id="delete-btn-group" style="display:none;margin-top:8px">
      <button class="btn-danger" id="delete-btn">删除此记录</button>
    </div>
  </div>
</div>

<script type="module" src="./js/app.js?v=1.2.3"></script>
</body>
</html>
